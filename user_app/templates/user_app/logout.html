{% extends 'blog_app/base.html' %}

{% block title %} Выход {% endblock %}

{% block content %}
    <h1>Вы вышли из аккаунта</h1>
    <form method="post" class="mt-4">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
    </form>
    <p class="mt-3">
        Войти снова?
        <a href="{% url 'login' %}" class="btn btn-primary mt-3">Войти</a>
        <a href="{% url 'post_list' %}" class="btn btn-secondary mt-3">Список постов</a>
    </p>
{% endblock content %}
